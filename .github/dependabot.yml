version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - "build"
      - "release-hygiene"

  - package-ecosystem: "cargo"
    directory: "/tools/asm-processor/rust"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      asm-processor-rust:
        patterns:
          - "*"
    labels:
      - "build"
      - "provenance"
